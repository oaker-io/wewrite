# KOL 订阅清单 · P1 (2026-04-25)
#
# 用法:
#   - status: active   表示要 fetch · biz_name 必填(__biz=xxx==)· rss_url 由 wewe-rss 启动后填
#   - status: pending  待用户添加 biz_name + 在 wewe-rss 后台订阅
#   - status: paused   暂停 fetch · 保留记录
#
# biz_name 怎么找:打开公众号任一篇文章 → 浏览器 url 含 `__biz=MzI...` → 复制等号前 base64 段
# 或在 wewe-rss web 界面里搜公众号名 · 它会自动解析
#
# tags:用于 idea_bank 入库时打分类标签(category 字段映射用)
# weight: 0-100 · 选题权重 · 头部 IP / 高契合给 70+ · 信息流给 40-50

