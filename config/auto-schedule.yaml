# 全自动发文 · 7 天主推 + 副推 + 评论运营 完整轮播表
# 由以下 script 读取:
#   scripts/workflow/auto_pick.py        · 选今日 idea (1-2 主 + N 副)
#   scripts/auto/auto-write.sh           · 跑 1+N 次 write.py
#   scripts/auto/auto-images.sh          · 主图全套 + 副推 1:1 thumb
#   scripts/auto/auto-publish.sh         · cli.py publish-bundle
#   scripts/auto/auto-comment-kickoff.sh · 群发后推置顶话术
#
# weekday: 0=周一 ... 6=周日(Python datetime.weekday() 语义)
# v3 (2026-04-25):mains 数组 [1-2 主] + companions ≥ 3 副 · 一次群发 N 篇 bundle

version: 2
enabled: true
notify_on_failure: true
steps:
  fetch_kol: true
  sync_xhs: true
  discover_kol: true
  hotspot_poll: true
  pick: true
  write: true
  images: true
  review: true
  publish: true
  notify: true
  comment_kickoff: true
  publish_guard: true
  daily_report: true
  stats: true
times:
  fetch_kol: 03:00
  sync_xhs: 03:05
  discover_kol: 03:30
  pick: 07:00
  write: 08:00
  images: '10:00'
  review: '11:00'
  publish: '12:00'
  notify: '19:30'
  comment_kickoff: '20:00'
  publish_guard: '21:30'
  daily_report: '22:00'
  stats: Sun 02:00
